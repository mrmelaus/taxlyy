<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taxlyy — Dashboard</title>

   <!-- Theme script — must load before CSS to prevent flash -->
  <script src="js/core/theme.js"></script>
 
  <!-- Core styles -->
<link rel="stylesheet" href="css/main.css" />

</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">
      <div class="logo-mark">T</div>
      <div class="logo-text sidebar-text">Tax<span>lyy</span></div>
    </div>

    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label sidebar-text">Overview</div>
        <div class="nav-item active" data-screen="dashboard" title="Dashboard">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1.5"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5"/>
          </svg>
          <span class="sidebar-text">Dashboard</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label sidebar-text">Invoicing</div>
        <div class="nav-item" data-screen="invoices" title="Invoices">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="1" width="12" height="14" rx="2"/>
            <line x1="5" y1="5" x2="11" y2="5"/>
            <line x1="5" y1="8" x2="11" y2="8"/>
            <line x1="5" y1="11" x2="8" y2="11"/>
          </svg>
          <span class="sidebar-text">Invoices</span>
          <span class="nav-badge sidebar-text" id="badge-invoices">12</span>
        </div>
        <div class="nav-item" data-screen="new-invoice" title="New invoice">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="7"/>
            <line x1="8" y1="5" x2="8" y2="11"/>
            <line x1="5" y1="8" x2="11" y2="8"/>
          </svg>
          <span class="sidebar-text">New invoice</span>
        </div>
        <div class="nav-item" data-screen="clients" title="Clients">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6" cy="5" r="3"/>
            <path d="M1 14c0-3 2-5 5-5s5 2 5 5"/>
            <circle cx="12" cy="5" r="2"/>
            <path d="M14 14c0-2-1-4-3-4"/>
          </svg>
          <span class="sidebar-text">Clients</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label sidebar-text">Tax &amp; Expenses</div>
        <div class="nav-item" data-screen="expenses" title="Expenses">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 4h12l-1 9H3L2 4z"/>
            <path d="M5 4V3a3 3 0 0 1 6 0v1"/>
          </svg>
          <span class="sidebar-text">Expenses</span>
          <span class="nav-badge alert sidebar-text" id="badge-expenses">3</span>
        </div>

        <div class="nav-item" data-screen="depreciation" title="Depreciation">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="14" height="10" rx="2"/>
            <line x1="4" y1="14" x2="12" y2="14"/>
            <line x1="8" y1="12" x2="8" y2="14"/>
          </svg>
          <span class="sidebar-text">Depreciation</span>
        </div>

        <div class="nav-item" data-screen="documents" title="Documents">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 2h8l4 4v8H2V2z"/>
            <path d="M10 2v4h4"/>
            <line x1="4" y1="10" x2="12" y2="10"/>
            <line x1="4" y1="13" x2="9" y2="13"/>
          </svg>
          <span class="sidebar-text">Documents</span>
        </div>

        <div class="nav-item" data-screen="bas" title="BAS reports">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="3" width="14" height="10" rx="2"/>
            <line x1="5" y1="7" x2="5" y2="11"/>
            <line x1="8" y1="5" x2="8" y2="11"/>
            <line x1="11" y1="8" x2="11" y2="11"/>
          </svg>
          <span class="sidebar-text">BAS reports</span>
        </div>
        <div class="nav-item" data-screen="annual" title="Annual report">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="7"/>
            <polyline points="8,4 8,8 11,10"/>
          </svg>
          <span class="sidebar-text">Annual report</span>
        </div>
        </div>
        

      <div class="nav-section">
        <div class="nav-label sidebar-text">Account</div>
        <div class="nav-item" data-screen="settings" title="Settings">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
          </svg>
          <span class="sidebar-text">Settings</span>
        </div>
      </div>
    </nav>

    <!-- Sidebar footer: collapse control only -->
    <div class="sidebar-footer">
      <div class="sidebar-collapse-control">

        <!-- Mode picker (shown on hover) -->
        <div class="collapse-menu" id="collapse-menu">
          <div class="collapse-menu-item" onclick="Sidebar.set('expanded')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="1" y1="4" x2="15" y2="4"/>
              <line x1="1" y1="8" x2="15" y2="8"/>
              <line x1="1" y1="12" x2="15" y2="12"/>
            </svg>
            <span>Expanded</span>
            <span class="collapse-menu-check" id="check-expanded">●</span>
          </div>
          <div class="collapse-menu-item" onclick="Sidebar.set('collapsed')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="1" y1="4" x2="6" y2="4"/>
              <line x1="1" y1="8" x2="6" y2="8"/>
              <line x1="1" y1="12" x2="6" y2="12"/>
            </svg>
            <span>Collapsed</span>
            <span class="collapse-menu-check" id="check-collapsed"></span>
          </div>
          <div class="collapse-menu-item" onclick="Sidebar.set('hover')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 8 C4 4, 12 4, 15 8 C12 12, 4 12, 1 8z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
            <span>Expand on hover</span>
            <span class="collapse-menu-check" id="check-hover"></span>
          </div>
        </div>

        <!-- Toggle button -->
        <button class="collapse-toggle" id="collapse-toggle" title="Sidebar control">
            <svg class="collapse-icon-expanded" width="16" height="64" viewBox="0 0 16 16"
              fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="1" y="1" width="14" height="14" rx="3"/>
              <polyline points="9 5 6 8 9 11"/>
            </svg>
            <svg class="collapse-icon-collapsed" width="16" height="16" viewBox="0 0 16 16"
              fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="1" y="1" width="14" height="14" rx="3"/>
              <polyline points="7 5 10 8 7 11"/>
            </svg>
            <span class="sidebar-text collapse-label">Sidebar control</span>
        </button>

      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Header -->
  <div class="header">
    <div class="page-title" id="page-title">
      Dashboard <span class="page-subtitle">FY 2024–25</span>
    </div>
    <div class="header-actions">
      <div class="search-bar">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="5"/>
          <line x1="10.5" y1="10.5" x2="14" y2="14"/>
        </svg>
        Search anything...
      </div>

      <!-- Theme toggle -->
      <div class="theme-toggle" title="Switch theme">
        <button class="theme-btn" data-theme="light" title="Light mode"
          onclick="Theme.set('light')" aria-label="Light mode">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="3"/>
            <line x1="8" y1="1" x2="8" y2="3"/>
            <line x1="8" y1="13" x2="8" y2="15"/>
            <line x1="1" y1="8" x2="3" y2="8"/>
            <line x1="13" y1="8" x2="15" y2="8"/>
            <line x1="2.9" y1="2.9" x2="4.3" y2="4.3"/>
            <line x1="11.7" y1="11.7" x2="13.1" y2="13.1"/>
            <line x1="2.9" y1="13.1" x2="4.3" y2="11.7"/>
            <line x1="11.7" y1="4.3" x2="13.1" y2="2.9"/>
          </svg>
        </button>
        <button class="theme-btn active" data-theme="auto" title="Auto (follows system)"
          onclick="Theme.set('auto')" aria-label="Auto mode">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M8 1.5v13M8 1.5A6.5 6.5 0 0 0 8 14.5" stroke-width="1"/>
            <path d="M8 1.5a6.5 6.5 0 0 1 0 13V1.5z" fill="currentColor" stroke="none" opacity="0.4"/>
          </svg>
        </button>
        <button class="theme-btn" data-theme="dark" title="Dark mode"
          onclick="Theme.set('dark')" aria-label="Dark mode">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z"/>
          </svg>
        </button>
      </div>

      <!-- Font size toggle -->
      <div class="font-size-toggle" title="Font size">
        <button class="font-size-btn" onclick="SettingsActions.setFontSize('small')" aria-label="Small text">
          A<sup style="font-size:8px">−</sup>
        </button>
        <button class="font-size-btn active" onclick="SettingsActions.setFontSize('medium')" aria-label="Medium text">
          A
        </button>
        <button class="font-size-btn" onclick="SettingsActions.setFontSize('large')" aria-label="Large text">
          A<sup style="font-size:10px">+</sup>
        </button>
      </div>

        <!-- Avatar — far right with extra left margin -->
      <div class="header-avatar" title="Jane Davidson · Pro plan"
        onclick="Router.go('settings')" style="margin-left:12px">
        <div class="avatar">JD</div>
      </div>

    </div>
  </div>

    <!-- Screen container -->
    <div class="content" id="content"></div>

  </main>
 <!-- ── JAVASCRIPT — load order matters ── -->
 
  <!-- 1. Core: data + utilities first -->
  <script src="js/core/data.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/router.js"></script>
 
  <!-- 2. Features: standalone modules -->
  <script src="js/features/abn-lookup.js"></script>
  <script src="js/features/invoice-preview.js"></script>
  <script src="js/features/sidebar.js"></script>
  <script src="js/features/depreciation-detector.js"></script>
  <script src="js/features/ocr-processor.js"></script>
  <script src="js/features/category-guide.js"></script>
 
  <!-- 3. Screens: one per file -->
  <script src="js/screens/dashboard.js"></script>
  <script src="js/screens/invoices.js"></script>
  <script src="js/screens/new-invoice.js"></script>
  <script src="js/screens/clients.js"></script>
  <script src="js/screens/expenses.js"></script>
  <script src="js/screens/bas.js"></script>
  <script src="js/screens/annual.js"></script>
  <script src="js/screens/depreciation.js"></script>
  <script src="js/screens/settings.js"></script>
  <script src="js/screens/documents.js"></script>
 
  <!-- 4. Bootstrap: always last -->
  <script src="js/core/main.js"></script>

</body>
</html>
